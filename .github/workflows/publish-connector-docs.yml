name: Publish Connector Docs to docs-integrator

on:
  workflow_run:
    workflows: ["Connector Documentation Automation"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID of the generation workflow to republish"
        required: true
        type: string
      docsIntegratorFork:
        description: "Fork to push feature branches to (org/repo)"
        required: true
        type: string
      docsIntegratorUpstream:
        description: "Upstream repo to open PRs against (org/repo)"
        required: false
        default: "wso2/docs-integrator"
        type: string
      docsIntegratorBaseBranch:
        description: "Base branch for docs-integrator PRs"
        required: false
        default: "dev"
        type: string

jobs:
  publish:
    name: Publish to docs-integrator
    runs-on: ubuntu-latest
    environment: docs-automation
    timeout-minutes: 30
    permissions:
      actions: read   # required to download artifacts from a different workflow run via run-id
    # For workflow_run: only proceed if the triggering workflow succeeded.
    # For workflow_dispatch: always proceed (user supplies a valid run ID).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    # Repo/branch defaults — used when triggered by workflow_run (no inputs available).
    # Override these via workflow_dispatch inputs when re-publishing manually.
    env:
      DOCS_FORK: ${{ inputs.docsIntegratorFork || 'wso2/docs-integrator' }}
      DOCS_UPSTREAM: ${{ inputs.docsIntegratorUpstream || 'wso2/docs-integrator' }}
      DOCS_BASE_BRANCH: ${{ inputs.docsIntegratorBaseBranch || 'dev' }}

    steps:
      # ── 1. Resolve source run ID ──────────────────────────────────────────────
      - name: Resolve source run ID
        id: source
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Download connector-docs artifact ──────────────────────────────────
      - name: Download connector-docs artifact
        uses: actions/download-artifact@v4
        with:
          name: connector-docs
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: connector-docs-artifact

      # ── 3. Read connector metadata ───────────────────────────────────────────
      - name: Read connector metadata
        id: meta
        run: |
          python3 - << 'PYEOF'
          import json, os, sys

          meta_path = "connector-docs-artifact/connector-meta.json"
          if not os.path.exists(meta_path):
            print("[ERROR] connector-meta.json not found in artifact", file=sys.stderr)
            sys.exit(1)

          with open(meta_path) as f:
            meta = json.load(f)

          connector_name = meta["connector_name"]
          dir_name       = meta["dir_name"]
          source_run_url = meta["source_run_url"]
          run_id         = meta["source_run_id"]

          # Short suffix for the feature branch (last 6 chars of run ID)
          short_run = str(run_id)[-6:]
          feature_branch = f"docs/publish-{connector_name}-{short_run}"

          gho = os.environ["GITHUB_OUTPUT"]
          with open(gho, "a") as f:
            f.write(f"connector_name={connector_name}\n")
            f.write(f"dir_name={dir_name}\n")
            f.write(f"source_run_url={source_run_url}\n")
            f.write(f"feature_branch={feature_branch}\n")

          print(f"connector_name={connector_name}")
          print(f"feature_branch={feature_branch}")
          PYEOF

      # ── 4. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      # ── 5. Install Claude Code CLI ────────────────────────────────────────────
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── 6. Clone docs-integrator fork ────────────────────────────────────────
      # Clone the configured base branch as the base — it is never modified directly.
      # All changes go to the feature branch created in the next step.
      - name: Clone docs-integrator fork
        env:
          DOCS_INTEGRATOR_TOKEN: ${{ secrets.DOCS_INTEGRATOR_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone \
            --branch "${{ env.DOCS_BASE_BRANCH }}" \
            --depth 1 \
            "https://x-access-token:${DOCS_INTEGRATOR_TOKEN}@github.com/${{ env.DOCS_FORK }}.git" \
            docs-repo

      # ── 7. Create feature branch from dev ────────────────────────────────────
      - name: Create feature branch
        run: |
          cd docs-repo
          git checkout -b "${{ steps.meta.outputs.feature_branch }}"

      # ── 8. Run Claude Code to place files intelligently ──────────────────────
      # Claude Code reads the generated markdown and screenshots from the artifact,
      # identifies the connector category, places files in the correct Docusaurus
      # paths, and rewrites image references in the markdown.
      - name: Run Claude Code to place connector docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONNECTOR_NAME: ${{ steps.meta.outputs.connector_name }}
          ARTIFACT_PATH: ${{ github.workspace }}/connector-docs-artifact
          DOCS_REPO_PATH: ${{ github.workspace }}/docs-repo
        run: |
          claude -p "
          You are a documentation engineer placing auto-generated WSO2 Integrator connector
          documentation into the docs-integrator Docusaurus repository.

          Environment variables available to you (read via Bash):
          - CONNECTOR_NAME  : connector identifier, e.g. \"mysql\", \"snowflake\"
          - ARTIFACT_PATH   : directory containing the generated docs artifact
          - DOCS_REPO_PATH  : root of the checked-out docs-integrator fork

          Artifact layout:
            \$ARTIFACT_PATH/workflow-docs/*.md   — exactly one step-by-step guide
            \$ARTIFACT_PATH/screenshots/*.png    — screenshots named {connector}_screenshot_*.png

          Docs repo layout:
            \$DOCS_REPO_PATH/en/docs/connectors/catalog/{category}/{connector-name}/  — markdown pages
            \$DOCS_REPO_PATH/en/static/img/connectors/{category}/{connector-name}/   — images
            \$DOCS_REPO_PATH/en/sidebars.ts                                          — navigation

          ── TASK 1: Read the generated markdown ──────────────────────────────────────────
          Read the .md file inside \$ARTIFACT_PATH/workflow-docs/.
          Note the connector name from the H1 heading and confirm it matches CONNECTOR_NAME.

          ── TASK 2: Find the correct category directory ───────────────────────────────────
          List \$DOCS_REPO_PATH/en/docs/connectors/catalog/ to see available categories:
            database, communication, ai-ml, cloud-infrastructure, crm-sales,
            developer-tools, ecommerce, erp-business

          Search each category for a directory whose name contains CONNECTOR_NAME (fuzzy match).
          If no match is found, infer the category from the connector type:
            mysql, postgresql, snowflake, redis, mongodb, cassandra, sqlite  → database
            smtp, sendgrid, twilio, vonage                                   → communication
            openai, anthropic, cohere, stability                             → ai-ml
            aws.*, gcp.*, azure.*                                            → cloud-infrastructure
            salesforce, hubspot, zoho, dynamics                             → crm-sales
            github, jira, slack, gitlab, bitbucket                          → developer-tools
            shopify, woocommerce, magento                                   → ecommerce
            sap, netsuite, odoo                                              → erp-business
          If still uncertain, use \"database\" as the default category.

          ── TASK 3: Determine target markdown path ───────────────────────────────────────
          Target directory: \$DOCS_REPO_PATH/en/docs/connectors/catalog/{category}/{connector-name}/
          Create it if it does not exist.
          Use filename \"example.md\"; if that already exists, use \"{connector-name}-example.md\".

          ── TASK 4: Copy and rewrite the markdown ────────────────────────────────────────
          Before writing the markdown to the target path, replace ALL image references:
            ../screenshots/{filename}.png
          with:
            /img/connectors/{category}/{connector-name}/{filename}.png
          where {category} and {connector-name} are the values determined in Tasks 2 and 3.
          Write the rewritten markdown to the target path.

          ── TASK 5: Copy screenshots ─────────────────────────────────────────────────────
          Create directory: \$DOCS_REPO_PATH/en/static/img/connectors/{category}/{connector-name}/
          Copy all .png files from \$ARTIFACT_PATH/screenshots/ to that directory.
          Skip any non-.png files (e.g. .log files).

          ── TASK 6: Update sidebars.ts (best-effort) ─────────────────────────────────────
          Read \$DOCS_REPO_PATH/en/sidebars.ts.
          Find the section for the connector's category. Sidebar entries use the pattern:
            \"connectors/catalog/{category}/{connector-name}/{page-slug}\"
          If the connector already has sidebar entries, append the new example page after the
          last existing entry for that connector.
          If the connector has no entries yet, add a new item in the correct category section.
          The new entry value: \"connectors/catalog/{category}/{connector-name}/{filename-without-extension}\"
          If the sidebars.ts structure is too complex to edit safely, skip this step and note it.

          ── TASK 7: Print a summary ───────────────────────────────────────────────────────
          Print:
          - Target markdown path (relative to DOCS_REPO_PATH)
          - Target images directory (relative to DOCS_REPO_PATH)
          - Whether sidebars.ts was updated (yes/no, and the added line if yes)
          - Any warnings or skipped steps

          ── CONSTRAINTS ───────────────────────────────────────────────────────────────────
          - Work ONLY inside DOCS_REPO_PATH — do not modify files outside it
          - Use absolute paths for all file operations
          - Do not add YAML frontmatter if the original markdown does not have it
          " --dangerously-skip-permissions 2>&1 | tee claude-placement-log.txt

      # ── 9. Verify Claude made changes ─────────────────────────────────────────
      - name: Verify changes were made
        run: |
          cd docs-repo
          CHANGED=$(git status --short | wc -l)
          echo "Files changed: $CHANGED"
          git status --short
          if [ "$CHANGED" -eq 0 ]; then
            echo "[ERROR] Claude Code made no changes. Check claude-placement-log.txt"
            cat ../claude-placement-log.txt
            exit 1
          fi

      # ── 10. Commit changes ────────────────────────────────────────────────────
      - name: Commit connector documentation
        run: |
          cd docs-repo
          git add .
          git commit -m "docs: add ${{ steps.meta.outputs.connector_name }} connector example documentation

          Auto-generated step-by-step guide with screenshots.
          Source: ${{ steps.meta.outputs.source_run_url }}"

      # ── 11. Push feature branch to fork ──────────────────────────────────────
      - name: Push feature branch to fork
        env:
          DOCS_INTEGRATOR_TOKEN: ${{ secrets.DOCS_INTEGRATOR_TOKEN }}
        run: |
          cd docs-repo
          git remote set-url origin \
            "https://x-access-token:${DOCS_INTEGRATOR_TOKEN}@github.com/${{ env.DOCS_FORK }}.git"
          git push origin "${{ steps.meta.outputs.feature_branch }}"

      # ── 12. Create PR to upstream docs-integrator ────────────────────────────
      # PR goes from {DOCS_FORK}:{feature-branch} to {DOCS_UPSTREAM}:{DOCS_BASE_BRANCH}
      - name: Create PR to upstream docs-integrator
        env:
          GH_TOKEN: ${{ secrets.DOCS_INTEGRATOR_TOKEN }}
        run: |
          CONNECTOR_NAME="${{ steps.meta.outputs.connector_name }}"
          FEATURE_BRANCH="${{ steps.meta.outputs.feature_branch }}"
          SOURCE_RUN_URL="${{ steps.meta.outputs.source_run_url }}"
          DOCS_FORK="${{ env.DOCS_FORK }}"
          FORK_OWNER="${DOCS_FORK%%/*}"

          # Title-case the connector name for display (e.g. mysql → MySQL handled by capitalisation)
          CONNECTOR_TITLE=$(echo "$CONNECTOR_NAME" | sed 's/-/ /g' \
            | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')

          gh pr create \
            --repo "${{ env.DOCS_UPSTREAM }}" \
            --title "docs: add ${CONNECTOR_TITLE} connector example guide" \
            --body "## Summary

          Adds a step-by-step example guide for the **${CONNECTOR_TITLE}** WSO2 Integrator connector,
          auto-generated by the [Connector Documentation Automation](${SOURCE_RUN_URL}) pipeline.

          ### What's included
          - Example tutorial with annotated screenshots showing each step in the WSO2 Integrator low-code canvas
          - Screenshots placed under \`en/static/img/connectors/…/${CONNECTOR_NAME}/\`
          - Sidebar navigation entry added (if applicable)

          ### Review checklist
          - [ ] Markdown renders correctly in Docusaurus preview
          - [ ] Images display (verify \`/img/connectors/…/${CONNECTOR_NAME}/\` paths resolve)
          - [ ] Sidebar entry is in the right category and position
          - [ ] Content is accurate for the connector

          ---
          Generated by [Connector Documentation Automation](${SOURCE_RUN_URL})" \
            --base "${{ env.DOCS_BASE_BRANCH }}" \
            --head "${FORK_OWNER}:${FEATURE_BRANCH}"

      # ── 13. Upload Claude placement log ──────────────────────────────────────
      - name: Upload Claude placement log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-placement-log-${{ steps.source.outputs.run_id }}
          path: claude-placement-log.txt
          retention-days: 14
          if-no-files-found: warn
