name: Connector Documentation Automation

on:
  workflow_dispatch:
    inputs:
      userGoal:
        description: "The WSO2 integration goal to document (e.g. 'Create an HTTP GET connector that fetches data from a MySQL database')"
        required: true
        type: string
      codeServerPort:
        description: "code-server port"
        required: false
        default: "8080"
        type: string
      agentServerPort:
        description: "Python agent server port"
        required: false
        default: "8765"
        type: string

jobs:
  automate:
    name: Generate Integration Documentation
    runs-on: ubuntu-latest
    environment: docs-automation
    timeout-minutes: 90

    steps:
      # ── 1. Source code ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Ballerina ─────────────────────────────────────────────────────────
      - name: Install Ballerina 2201.13.1
        run: |
          wget -q https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb
          sudo dpkg -i ballerina-2201.13.1-swan-lake-linux-x64.deb
          echo "/usr/lib/ballerina/bin" >> "$GITHUB_PATH"

      # ── 3. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: |
          cd agent
          uv venv
          uv pip install -r requirements.txt
          .venv/bin/playwright install chromium --with-deps

      # ── 4. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      # ── 5. Claude Code CLI ───────────────────────────────────────────────────
      # The pipeline checks 'claude --version' (Step 2 pre-flight).
      # The claude-agent-sdk spawns a 'claude' subprocess for agentic execution.
      # The CLI authenticates via the ANTHROPIC_API_KEY environment variable set on the pipeline step.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── 6. Playwright ────────────────────────────────────────────────────────
      # Installs Chromium and all required system libraries for headless browsing.
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── 7. code-server ───────────────────────────────────────────────────────
      # Install code-server first so we can pre-install the WSO2 extension before
      # the pipeline starts. The pipeline's Step 3 (check/install) will see it's
      # already installed and skip; Step 4 (start) will launch it fresh.
      - name: Install code-server
        run: curl -fsSL https://code-server.dev/install.sh | sh

      # ── 8. WSO2 Integrator extension ─────────────────────────────────────────
      # The extension is pre-release and cannot be installed from the marketplace,
      # so we install it from the bundled .vsix file in the extensions/ directory.
      - name: Install WSO2 Integrator extension from local .vsix
        run: code-server --install-extension extensions/wso2.wso2-integrator-0.1.0.vsix

      # ── 9. Config.toml ───────────────────────────────────────────────────────
      # Use Python to write the file so special characters in the API key or goal
      # are properly escaped for TOML basic string syntax.
      - name: Create Config.toml
        env:
          USER_GOAL: ${{ inputs.userGoal }}
          CODE_SERVER_PORT: ${{ inputs.codeServerPort }}
          AGENT_SERVER_PORT: ${{ inputs.agentServerPort }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os

          def toml_escape(s: str) -> str:
              """Escape backslashes and double-quotes for a TOML basic string."""
              return s.replace("\\", "\\\\").replace('"', '\\"')

          api_key    = os.environ["LLM_API_KEY"]
          user_goal  = toml_escape(os.environ["USER_GOAL"])
          code_port  = int(os.environ["CODE_SERVER_PORT"])
          agent_port = int(os.environ["AGENT_SERVER_PORT"])

          config = (
              f'llmApiKey = "{api_key}"\n'
              f'userGoal = "{user_goal}"\n'
              f"codeServerPort = {code_port}\n"
              f"agentServerPort = {agent_port}\n"
          )

          with open("Config.toml", "w") as f:
              f.write(config)

          print("Config.toml written successfully.")
          PYEOF

      # ── 10. Start Python agent server ────────────────────────────────────────
      # Start the agent server in the background before bal run so the pipeline's
      # Step 5 (agent server check) finds it already running and skips auto-start.
      # CLAUDECODE is unset to allow the SDK to spawn its own Claude Code subprocess.
      - name: Start Python agent server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          cd agent
          unset CLAUDECODE
          nohup .venv/bin/python agent_server.py --port 8765 &
          echo "Waiting for agent server to be ready..."
          for i in $(seq 1 20); do
            if curl -s http://localhost:8765/health > /dev/null 2>&1; then
              echo "Agent server is ready."
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 1
          done
          echo "Agent server did not become ready within 20 seconds."
          exit 1

      # ── 11. Run the full pipeline ────────────────────────────────────────────
      # Authentication:
      # - Ballerina (ai_client.bal) reads llmApiKey from Config.toml (written in step 9).
      # - ANTHROPIC_API_KEY is set here so the 'claude' subprocess spawned by the
      #   agent SDK authenticates via API key (reuses the same LLM_API_KEY secret).
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: bal run
        timeout-minutes: 80

      # ── 12. Extract connector name from the generated workflow doc ───────────
      - name: Extract connector name
        id: connector
        run: |
          DOC_FILE=$(find artifacts/workflow-docs -name "*.md" | head -1)
          if [ -z "$DOC_FILE" ]; then
            echo "[WARN] No workflow doc found — docs-repo push will be skipped."
            echo "connector_name=unknown" >> "$GITHUB_OUTPUT"
            echo "dir_name=unknown-connector-example-documentation" >> "$GITHUB_OUTPUT"
            echo "branch_name=unknown-example-document" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CONNECTOR_NAME=$(grep "^# " "$DOC_FILE" | head -1 \
            | sed 's/^# //' | sed 's/ Connector Example.*//' \
            | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          echo "connector_name=$CONNECTOR_NAME" >> "$GITHUB_OUTPUT"
          echo "dir_name=${CONNECTOR_NAME}-connector-example-documentation" >> "$GITHUB_OUTPUT"
          echo "branch_name=${CONNECTOR_NAME}-example-document" >> "$GITHUB_OUTPUT"
          echo "[INFO] Connector name: $CONNECTOR_NAME"

      # ── 13. Organise artifacts into the named connector directory ─────────────
      - name: Organise artifacts into connector directory
        run: |
          DIR_NAME="${{ steps.connector.outputs.dir_name }}"
          mkdir -p "$DIR_NAME/workflow-docs"
          mkdir -p "$DIR_NAME/screenshots"
          cp artifacts/workflow-docs/*.md "$DIR_NAME/workflow-docs/" 2>/dev/null || true
          cp artifacts/screenshots/*.png  "$DIR_NAME/screenshots/"  2>/dev/null || true

      # ── 14. Push to Generated-Connector-Documentation. and open a PR ─────────
      # Requires the DOCS_REPO_TOKEN secret: a PAT with `repo` scope on
      # vishwajayawickrama/Generated-Connector-Documentation.
      - name: Push to docs repo and create PR
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          CONNECTOR_NAME="${{ steps.connector.outputs.connector_name }}"
          DIR_NAME="${{ steps.connector.outputs.dir_name }}"
          BRANCH_NAME="${{ steps.connector.outputs.branch_name }}"

          if [ "$CONNECTOR_NAME" = "unknown" ]; then
            echo "[WARN] No connector name extracted — skipping docs-repo push."
            exit 0
          fi

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone \
            "https://x-access-token:${DOCS_REPO_TOKEN}@github.com/vishwajayawickrama/Generated-Connector-Documentation..git" \
            target-repo

          cd target-repo
          git checkout -b "$BRANCH_NAME"
          cp -r "../$DIR_NAME" .
          git add .
          git commit -m "docs: add ${CONNECTOR_NAME} connector example documentation"
          git push origin "$BRANCH_NAME"

          printf '%s\n' \
            "## ${CONNECTOR_NAME^} Connector Example Documentation" \
            "" \
            "Auto-generated workflow documentation for the **${CONNECTOR_NAME}** WSO2 Integrator connector." \
            "" \
            "### Contents" \
            "- \`${DIR_NAME}/workflow-docs/\` — Step-by-step connector guide with embedded screenshots" \
            "- \`${DIR_NAME}/screenshots/\` — Captured workflow screenshots (5-7 milestones)" \
            "" \
            "Generated by Connector Documentation Automation: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /tmp/pr-body.md

          gh pr create \
            --title "docs: add ${CONNECTOR_NAME} connector example documentation" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH_NAME" \
            --repo "vishwajayawickrama/Generated-Connector-Documentation."

      # ── 15. Upload artifacts ──────────────────────────────────────────────────
      # Always upload — even on failure — so partial outputs (e.g. execution prompt
      # generated but agent crashed) are available for debugging.
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.connector.outputs.dir_name }}-${{ github.run_id }}
          path: |
            artifacts/execution-prompt/
            artifacts/screenshots/
            artifacts/workflow-docs/
          retention-days: 30
          if-no-files-found: warn
